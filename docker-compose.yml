services:
  nextjs:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env.local
    environment:
      - PORT=3000
      - NEURAUDIT_GEMINI_MODEL=${NEURAUDIT_GEMINI_MODEL:-gemini-2.5-flash}
      - NEURAUDIT_ADK_ANALYZE_URL=http://adk-analyze:8001/analyze
      - NEURAUDIT_CACHE_TTL_MS=${NEURAUDIT_CACHE_TTL_MS:-1800000}
      - NEURAUDIT_FETCH_CONCURRENCY=${NEURAUDIT_FETCH_CONCURRENCY:-4}
      - NEXT_PUBLIC_APP_URL=http://localhost:3000
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GOOGLE_API_KEY=${GOOGLE_API_KEY:-}
      - ELASTIC_ENDPOINT=${ELASTIC_ENDPOINT:-}
      - ELASTIC_API_KEY=${ELASTIC_API_KEY:-}
    depends_on:
      adk-analyze:
        condition: service_healthy
    restart: unless-stopped

  adk-analyze:
    build:
      context: .
      dockerfile: neuraudit_agent/Dockerfile
    ports:
      - "8001:8001"
    env_file:
      - .env.local
    environment:
      - NEURAUDIT_GEMINI_MODEL=${NEURAUDIT_GEMINI_MODEL:-gemini-2.5-flash}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8001/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
    restart: unless-stopped
